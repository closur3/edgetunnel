name: Sync Fork with Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the repository
      uses: actions/checkout@main

    - name: Sync with Upstream
      uses: TG908/fork-sync@master
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        owner: cmliu
        head: main
        base: main
